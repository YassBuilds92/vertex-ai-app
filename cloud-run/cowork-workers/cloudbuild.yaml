substitutions:
  _SERVICE_NAME: cowork-workers
  _REGION: europe-west1
  _REPOSITORY: cowork-workers
  _IMAGE_TAG: manual
  _WORKSPACE_BUCKET: project-82b8c612-ea3d-49f5-864-studio-output

steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_SERVICE_NAME}:${_IMAGE_TAG}
      - .
  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_SERVICE_NAME}:${_IMAGE_TAG}
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE_NAME}
      - --image
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_SERVICE_NAME}:${_IMAGE_TAG}
      - --region
      - ${_REGION}
      - --platform
      - managed
      - --cpu
      - "1"
      - --memory
      - 1Gi
      - --timeout
      - "300"
      - --update-env-vars
      - COWORK_SANDBOX_PERSIST_SESSIONS=1,COWORK_SANDBOX_PERSIST_BUCKET=${_WORKSPACE_BUCKET},COWORK_WORKSPACE_BUCKET=${_WORKSPACE_BUCKET}
      - --allow-unauthenticated

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_SERVICE_NAME}:${_IMAGE_TAG}
